services:
  picfolderbot:
    build: .
    container_name: picfolderbot
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.00
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - HEALTH_ADDR=:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
